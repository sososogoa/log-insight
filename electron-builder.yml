appId: dev.biglink.loginsight
productName: LogInsight
directories:
  buildResources: build
  output: release
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintrc,.eslintignore,.prettierignore,.prettierrc,tsconfig*,postcss.config.js,tailwind.config.js,electron-builder.yml,CLAUDE.md}'
asarUnpack:
  - resources/**
mac:
  target:
    - dmg
  category: public.app-category.developer-tools
win:
  target:
    - nsis
linux:
  target:
    - AppImage
  category: Development
